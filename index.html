<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <form class="composer" data-todo-form>
        <input
          class="composer__input"
          type="text"
          placeholder="Add a task"
          autocomplete="off"
          data-todo-input
        />
        <button class="submit-btn" type="submit">submit</button>
      </form>

      <p class="status" role="alert" data-status hidden></p>

      <div class="board">
        <section class="board__column" aria-labelledby="pending-heading">
          <h2 class="board__heading" id="pending-heading">Pending Tasks</h2>
          <ul class="todo-list" data-pending-list></ul>
        </section>

        <section class="board__column" aria-labelledby="completed-heading">
          <h2 class="board__heading" id="completed-heading">Completed Tasks</h2>
          <ul class="todo-list" data-completed-list></ul>
        </section>
      </div>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
